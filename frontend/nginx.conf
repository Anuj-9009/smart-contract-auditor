# ═══════════════════════════════════════════════════════════
# Nginx — SPA Serving + API Reverse Proxy
# Serves React app, proxies /api/* to FastAPI backend
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── Security Headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── API Reverse Proxy ───────────────────────────────
    # Routes /api/* requests to the FastAPI backend container
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;  # Ollama can be slow
        proxy_send_timeout 60s;
    }

    # ─── Static Assets (cached aggressively) ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA Fallback ────────────────────────────────────
    # All non-file routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
